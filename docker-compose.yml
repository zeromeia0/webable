# Git / local-build model: build context from this repo, tag `webable:local`.
# For immutable GHCR pulls use docker-compose.image.yml; optional Watchtower: docker-compose.watchtower.yml.
# Local-first Webable: app runs in Docker; data stays on your machine in ./data
#
# Optional AI: Ollama sidecar (cloud models require sign-in; Webable does not auto-pull models).
services:
  ollama:
    image: ollama/ollama:latest
    container_name: webable-ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"

  webable:
    build:
      context: .
      args:
        WEBABLE_GIT_COMMIT: ${WEBABLE_GIT_COMMIT:-}
        WEBABLE_APP_VERSION: ${WEBABLE_APP_VERSION:-}
    image: webable:local
    container_name: webable
    restart: unless-stopped
    ports:
      # Host port : container port (uvicorn listens on 8000 inside the container)
      - "8080:8000"
    environment:
      APP_ENV: production
      WEBABLE_DATA_DIR: /app/data
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: minimax-m2.5:cloud
    volumes:
      - ./data:/app/data
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s

volumes:
  ollama_data:
