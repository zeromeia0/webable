# Production-style deploy: pull a pre-built image from GHCR (no local `docker build`).
# Usage:
#   WEBABLE_VERSION=1.0.0 docker compose -f docker-compose.image.yml up -d
# Or pin digest in production after verifying an image.
#
# Data is still only in ./data — never baked into the image.
# Optional AI: Ollama sidecar (cloud models require sign-in; Webable does not auto-pull models).
services:
  ollama:
    image: ollama/ollama:latest
    container_name: webable-ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"

  webable:
    image: ghcr.io/zeromeia0/webable:${WEBABLE_VERSION:-latest}
    pull_policy: always
    container_name: webable
    restart: unless-stopped
    ports:
      - "8080:8000"
    environment:
      APP_ENV: production
      WEBABLE_DATA_DIR: /app/data
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: minimax-m2.5:cloud
    volumes:
      - ./data:/app/data
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s

volumes:
  ollama_data:
