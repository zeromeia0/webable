{# Requires fab_instance_id (int|none), optional fab_next_url #}
{% if fab_instance_id %}
<button type="button" id="globalQuickAddFab" class="webable-fab-quickadd webable-fab-btn" title="Quick add transaction" aria-label="Quick add transaction" aria-expanded="false" aria-controls="globalQuickAddPanel">+</button>

<div id="globalQuickAddPanel" class="webable-fab-panel webable-fab-quickadd-panel hidden" role="dialog" aria-label="Quick add transaction">
  <div class="flex items-center justify-between p-3 border-b border-slate-700">
    <span class="font-semibold text-sm">Quick add</span>
    <button type="button" id="globalQuickAddClose" class="text-slate-400 hover:text-slate-200 text-lg leading-none px-2" aria-label="Close">&times;</button>
  </div>
  <form method="post" action="/instances/{{ fab_instance_id }}/quick-oneoff" class="p-3 space-y-3 text-sm">
    <input type="hidden" name="next_url" value="{{ fab_next_url | default('/dashboard') }}" />
    <div>
      <label class="text-xs text-slate-400">Type</label>
      <div class="flex gap-4 mt-1">
        <label class="inline-flex items-center gap-1.5"><input type="radio" name="txn_type" value="expense" checked class="accent-rose-500" /> Expense</label>
        <label class="inline-flex items-center gap-1.5"><input type="radio" name="txn_type" value="income" class="accent-emerald-500" /> Income</label>
      </div>
    </div>
    <div>
      <label class="text-xs text-slate-400" for="qaAmount">Amount (EUR)</label>
      <input id="qaAmount" name="amount" type="number" step="0.01" min="0.01" required class="w-full mt-1 px-3 py-2 rounded-lg bg-slate-800 border border-slate-700" />
    </div>
    <div>
      <label class="text-xs text-slate-400" for="qaDesc">Description</label>
      <input id="qaDesc" name="description" required class="w-full mt-1 px-3 py-2 rounded-lg bg-slate-800 border border-slate-700" />
    </div>
    <div>
      <label class="text-xs text-slate-400" for="qaDate">Date</label>
      <input id="qaDate" name="txn_date" type="date" class="w-full mt-1 px-3 py-2 rounded-lg bg-slate-800 border border-slate-700" />
    </div>
    <div id="qaCategoryWrap">
      <label class="text-xs text-slate-400" for="qaCategory">Category</label>
      <select id="qaCategory" name="category" class="w-full mt-1 px-3 py-2 rounded-lg bg-slate-800 border border-slate-700">
        {% for c in oneoff_categories %}
        <option value="{{ c }}">{{ c }}</option>
        {% endfor %}
      </select>
    </div>
    <button type="submit" class="w-full py-2 rounded-lg bg-emerald-600 hover:bg-emerald-500 font-medium">Add transaction</button>
  </form>
</div>
<script src="/static/js/webable-quick-add.js"></script>
{% endif %}
